name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/pgp/gpg-wasm

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM module
        working-directory: apps/pgp/gpg-wasm
        run: wasm-pack build --target web --release

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

      - name: SHA-256 build output
        working-directory: apps/pgp/.output/chrome-mv3
        run: find . -type f ! -name 'manifest.json' | sort | xargs sha256sum | tee "$GITHUB_STEP_SUMMARY"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pgp-tools-chrome-mv3
          path: apps/pgp/.output/chrome-mv3
